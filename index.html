<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1f3a5f">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Contagem de Remessa</title>
<style>
  :root{
    --azul:#1f3a5f;
    --azul-escuro:#152840;
    --verde:#1f6b3a;
    --verde-claro:#e6f3ec;
    --vermelho:#b00020;
    --cinza:#5b6677;
    --linha:#e2e6ec;
    --fundo:#eef1f5;
    --branco:#ffffff;
    --tap:#2e5a8f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--fundo);color:#1a2230;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  }

  /* ---- topo fixo ---- */
  header{background:var(--azul);color:#fff;padding:12px 14px 10px;flex:0 0 auto}
  .titulo{font-size:19px;font-weight:800;letter-spacing:.3px}
  .sub{font-size:12.5px;color:#bcd0e8;margin-top:2px}
  .busca-wrap{position:relative;margin-top:10px}
  #busca{
    width:100%;border:none;border-radius:11px;padding:14px 44px 14px 16px;
    font-size:17px;background:#fff;color:#1a2230;outline:none;
  }
  #busca::placeholder{color:#8a93a3}
  .limpar-busca{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);
    border:none;background:#dfe4ec;color:#5b6677;width:32px;height:32px;
    border-radius:8px;font-size:18px;display:none;align-items:center;justify-content:center;
  }
  .limpar-busca.on{display:flex}

  /* ---- lista ---- */
  main{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 12px}
  .item{
    display:flex;align-items:center;gap:10px;
    background:var(--branco);border:1px solid var(--linha);border-radius:13px;
    padding:9px 9px 9px 14px;margin-bottom:8px;
  }
  .item.tem{border-color:#b9d3b9;background:#fbfefb}
  .nome{flex:1 1 auto;font-size:15.5px;font-weight:600;line-height:1.2;min-width:0}
  .contador{
    flex:0 0 auto;display:flex;align-items:center;gap:8px;
  }
  .qtd{
    min-width:42px;text-align:center;font-size:23px;font-weight:800;
    color:var(--cinza);font-variant-numeric:tabular-nums;
  }
  .qtd.tem{color:var(--verde)}
  button.btn{
    border:none;border-radius:11px;font-weight:800;color:#fff;
    display:flex;align-items:center;justify-content:center;user-select:none;
  }
  .mais{width:62px;height:58px;background:var(--azul);font-size:30px}
  .mais:active{background:var(--tap);transform:scale(.94)}
  .menos{width:46px;height:58px;background:#cfd6e0;color:#5b6677;font-size:26px}
  .menos:active{background:#b9c1cd;transform:scale(.94)}
  .menos:disabled{opacity:.35}

  .vazio{text-align:center;color:#8a93a3;font-size:15px;padding:40px 20px}

  /* ---- rodapé fixo ---- */
  footer{flex:0 0 auto;background:var(--branco);border-top:1px solid var(--linha);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));}
  .total-linha{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
  .total-rot{font-size:13px;color:var(--cinza);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .total-num{font-size:26px;font-weight:800;color:var(--azul);font-variant-numeric:tabular-nums}
  .acoes{display:flex;gap:8px}
  .acao{flex:1;border:none;border-radius:11px;padding:14px 8px;font-size:15px;font-weight:800;color:#fff}
  .enviar{background:var(--verde)}
  .enviar:active{background:#185a30}
  .copiar{background:var(--azul)}
  .copiar:active{background:var(--tap)}
  .menu-btn{flex:0 0 auto;width:52px;background:#eef1f5;color:#5b6677;font-size:22px}
  .menu-btn:active{background:#dfe4ec}

  /* ---- folha de overlay (menu/exportar) ---- */
  .sheet-bg{position:fixed;inset:0;background:rgba(15,25,40,.55);display:none;z-index:10}
  .sheet-bg.on{display:block}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;background:#fff;z-index:11;
    border-radius:18px 18px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .22s ease;max-height:80dvh;overflow:auto;
  }
  .sheet.on{transform:translateY(0)}
  .sheet h2{font-size:17px;margin-bottom:4px}
  .sheet p{font-size:13.5px;color:var(--cinza);margin-bottom:12px}
  .sheet .acao{width:100%;margin-bottom:9px}
  .reset{background:#fbeaec;color:var(--vermelho)}
  .reset:active{background:#f3d6da}
  .fechar-sheet{background:#eef1f5;color:#5b6677}
  pre.export{
    background:#f4f6f9;border:1px solid var(--linha);border-radius:10px;padding:12px;
    font-size:13px;white-space:pre-wrap;word-break:break-word;max-height:34dvh;overflow:auto;margin-bottom:12px;
    font-family:ui-monospace,Menlo,Consolas,monospace;
  }

  /* ---- tela cheia de resumo ---- */
  .full{
    position:fixed;inset:0;z-index:30;background:var(--fundo);
    display:none;flex-direction:column;
  }
  .full.on{display:flex}
  .full-head{background:var(--azul);color:#fff;display:flex;align-items:center;gap:6px;
    padding:14px 14px;flex:0 0 auto}
  .full-voltar{border:none;background:transparent;color:#fff;font-size:30px;line-height:1;
    width:38px;height:38px;display:flex;align-items:center;justify-content:center;margin-left:-6px}
  .full-voltar:active{opacity:.6}
  .full-titulo{font-size:19px;font-weight:800}
  .full-body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 14px}
  .resumo-vazio{text-align:center;color:#8a93a3;font-size:16px;padding:50px 24px}
  .resumo-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--linha);
    border-radius:12px;padding:13px 15px;margin-bottom:8px}
  .resumo-item .rnome{flex:1 1 auto;font-size:16px;font-weight:600;line-height:1.25}
  .resumo-item .rqtd{flex:0 0 auto;font-size:24px;font-weight:800;color:var(--verde);
    font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
  .resumo-cont{font-size:13px;color:var(--cinza);font-weight:700;text-transform:uppercase;
    letter-spacing:.5px;margin:2px 2px 10px}
  .full-foot{flex:0 0 auto;background:#fff;border-top:1px solid var(--linha);
    padding:12px 12px calc(12px + env(safe-area-inset-bottom))}
  .full-total{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px}
  .full-total-num{font-size:30px;font-weight:800;color:var(--azul);font-variant-numeric:tabular-nums}
  .full-foot .acao{width:100%;margin-bottom:9px;padding:16px 8px;font-size:16px}
  .full-foot .acao:last-child{margin-bottom:0}

  /* ---- editor de produtos ---- */
  .edit-item{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--linha);
    border-radius:12px;padding:11px 11px 11px 15px;margin-bottom:8px}
  .edit-item .enome{flex:1 1 auto;font-size:15.5px;font-weight:600;line-height:1.25;min-width:0;
    word-break:break-word}
  .edit-btn{flex:0 0 auto;border:none;border-radius:10px;width:46px;height:44px;font-size:18px;
    display:flex;align-items:center;justify-content:center;font-weight:700}
  .edit-ren{background:#e7eef7;color:var(--azul)}
  .edit-ren:active{background:#d4e0ee}
  .edit-rem{background:#fbeaec;color:var(--vermelho)}
  .edit-rem:active{background:#f3d6da}
  .edit-dica{font-size:13px;color:var(--cinza);margin:2px 2px 12px;line-height:1.4}

  /* ---- toast ---- */
  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--azul-escuro);color:#fff;padding:11px 18px;border-radius:24px;
    font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:20;white-space:nowrap;
  }
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<noscript>
  <div style="padding:24px;font-family:sans-serif;background:#fbeaec;color:#b00020;font-size:16px;line-height:1.5">
    <b>Este app precisa abrir no navegador.</b><br>
    Parece que você abriu por um visualizador de arquivos. Abra pelo
    <b>Chrome</b> (ou use o link instalado na tela inicial).
  </div>
</noscript>
<header>
  <div class="titulo">Contagem de Remessa</div>
  <div class="sub" id="sub">Toque em + a cada unidade que chegar</div>
  <div class="busca-wrap">
    <input id="busca" type="text" inputmode="search" autocomplete="off" placeholder="Buscar produto…">
    <button class="limpar-busca" id="limparBusca" aria-label="Limpar busca">×</button>
  </div>
</header>

<main id="lista"></main>

<footer>
  <div class="total-linha">
    <span class="total-rot">Total da semana</span>
    <span class="total-num" id="totalNum">0</span>
  </div>
  <div class="acoes">
    <button class="acao enviar" id="btnEnviar">Enviar</button>
    <button class="acao copiar" id="btnCopiar">Copiar p/ planilha</button>
    <button class="acao menu-btn" id="btnMenu" aria-label="Mais opções">⋯</button>
  </div>
</footer>

<!-- folha de opções -->
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <div id="sheetMenu">
    <h2>Opções</h2>
    <p>Comece uma semana nova só depois de enviar a contagem atual.</p>
    <button class="acao reset" id="btnNovaSemana">Começar semana nova (zerar tudo)</button>
    <button class="acao copiar" id="btnEditarProdutos">Editar produtos</button>
    <button class="acao fechar-sheet" id="btnFecharMenu">Voltar</button>
  </div>
</div>

<!-- tela cheia de edição de produtos -->
<div class="full" id="editFull">
  <div class="full-head">
    <button class="full-voltar" id="editFechar" aria-label="Voltar">‹</button>
    <div class="full-titulo">Editar produtos</div>
  </div>
  <div class="full-body" id="editBody"></div>
  <div class="full-foot">
    <button class="acao enviar" id="btnAddProduto">+ Adicionar produto</button>
    <button class="acao copiar" id="btnExportCat">Exportar catálogo (p/ o leitor)</button>
  </div>
</div>

<!-- tela cheia de resumo -->
<div class="full" id="resumoFull">
  <div class="full-head">
    <button class="full-voltar" id="resumoFechar" aria-label="Voltar">‹</button>
    <div class="full-titulo">Resumo da semana</div>
  </div>
  <div class="full-body" id="resumoBody"></div>
  <div class="full-foot">
    <div class="full-total">
      <span class="total-rot">Total geral</span>
      <span class="full-total-num" id="resumoTotal">0</span>
    </div>
    <button class="acao enviar" id="btnShareWpp">Enviar pelo WhatsApp</button>
    <button class="acao copiar" id="btnCopiarResumo">Copiar resumo</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const DEFAULT_PRODUTOS = [
"LIQUIDIFICADOR AR 2L 110 M1","LIQUIDIFICADOR AR 2L 220 M1","LIQUIDIFICADOR AR 4L 110 M1",
"LIQUIDIFICADOR AR 4L 220 M1","LIQUIDIFICADOR BR 2L 110 M1","LIQUIDIFICADOR BR 2L 220 M1",
"LIQUIDIFICADOR BR 4L 110 M1","LIQUIDIFICADOR BR 4L 220 M1","LIQUIDIFICADOR BR 6L 110 M1",
"LIQUIDIFICADOR BR 6L 220 M1","LIQUIDIFICADOR BR 8L 110 M1","LIQUIDIFICADOR BR 8L 220 M1",
"LIQUIDIFICADOR BR 10L 110 M1","LIQUIDIFICADOR BR 10L 220 M1","LIQUIDIFICADOR BR 2L JL",
"LIQUIDIFICADOR BR 4L JL","LIQUIDIFICADOR BR 6L JL","LIQUIDIFICADOR BR 8L JL",
"LIQUIDIFICADOR BR 10L JL","LIQUIDIFICADOR BR 12L JL","LIQUIDIFICADOR BR 2L 110 LEVE",
"LIQUIDIFICADOR BR 2L 220 LEVE","LIQUIDIFICADOR BR 3,5L 110 LEVE","LIQUIDIFICADOR BR 3,5L 220 LEVE",
"LIQUIDIFICADOR BR 6L 110 LEVE","LIQUIDIFICADOR BR 6L 220 LEVE","LIQUIDIFICADOR BR 8L 110 LEVE",
"LIQUIDIFICADOR BR 8L 220 LEVE","LIQUIDIFICADOR BR 10L 110 LEVE","LIQUIDIFICADOR BR 10L 220 LEVE",
"LIQUIDIFICADOR AR 2L 110 JL","LIQUIDIFICADOR AR 2L 220 JL","LIQUIDIFICADOR AR 4L 110 JL",
"LIQUIDIFICADOR AR 4L 220 JL","CUTTER 6L 110","CUTTER 6L 220","CAVELETE 15L","CAVELETE 19L",
"CAVELETE 25L","CAVELETE 30L","EXTRATOR BICA PLÁSTICA","CANHÃO","COPO 2L AR M1","COPO 4L AR M1",
"COPO 2L BR M1","COPO 4L BR M1","POWER","PP"
];
const CHAVE = "contagem_remessa_v1";
const CHAVE_CAT = "contagem_catalogo_v1";

// ---- catálogo (editável) ----
let PRODUTOS = carregarCatalogo();
function carregarCatalogo(){
  try{
    const raw = localStorage.getItem(CHAVE_CAT);
    if(raw){
      const arr = JSON.parse(raw);
      if(Array.isArray(arr) && arr.length>0) return arr.map(s=>String(s));
    }
  }catch(e){}
  return DEFAULT_PRODUTOS.slice();
}
function salvarCatalogo(){
  try{ localStorage.setItem(CHAVE_CAT, JSON.stringify(PRODUTOS)); }catch(e){}
}

// ---- estado ----
let qtds = carregar();
alinhar();

function carregar(){
  try{
    const raw = localStorage.getItem(CHAVE);
    if(raw){
      const arr = JSON.parse(raw);
      if(Array.isArray(arr)) return arr.map(n=>parseInt(n)||0);
    }
  }catch(e){}
  return new Array(PRODUTOS.length).fill(0);
}
function salvar(){
  try{ localStorage.setItem(CHAVE, JSON.stringify(qtds)); }catch(e){}
}
// mantém qtds do mesmo tamanho do catálogo
function alinhar(){
  while(qtds.length < PRODUTOS.length) qtds.push(0);
  if(qtds.length > PRODUTOS.length) qtds.length = PRODUTOS.length;
}

// ---- normalização p/ busca ----
function norm(s){
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase();
}
let NOMES_NORM = PRODUTOS.map(norm);

// ---- render ----
const lista = document.getElementById("lista");
const refs = []; // {item, qtdEl, menosEl}

function montar(){
  lista.innerHTML = "";
  refs.length = 0;
  PRODUTOS.forEach((nome,i)=>{
    const item = document.createElement("div");
    item.className = "item";
    item.dataset.i = i;

    const nm = document.createElement("div");
    nm.className = "nome"; nm.textContent = nome;

    const cont = document.createElement("div");
    cont.className = "contador";

    const menos = document.createElement("button");
    menos.className = "btn menos"; menos.textContent = "−";
    menos.setAttribute("aria-label","Diminuir "+nome);
    menos.addEventListener("click",()=>dec(i));

    const q = document.createElement("div");
    q.className = "qtd";

    const mais = document.createElement("button");
    mais.className = "btn mais"; mais.textContent = "+";
    mais.setAttribute("aria-label","Adicionar "+nome);
    mais.addEventListener("click",()=>inc(i));

    cont.append(menos,q,mais);
    item.append(nm,cont);
    lista.append(item);
    refs.push({item,qtdEl:q,menosEl:menos});
    pintarLinha(i);
  });
  atualizarTotal();
}

function pintarLinha(i){
  const r = refs[i]; if(!r) return;
  const v = qtds[i];
  r.qtdEl.textContent = v;
  r.qtdEl.classList.toggle("tem", v>0);
  r.item.classList.toggle("tem", v>0);
  r.menosEl.disabled = v<=0;
}

function inc(i){ qtds[i]++; salvar(); pintarLinha(i); atualizarTotal(); }
function dec(i){ if(qtds[i]>0){ qtds[i]--; salvar(); pintarLinha(i); atualizarTotal(); } }

function atualizarTotal(){
  const t = qtds.reduce((a,b)=>a+b,0);
  document.getElementById("totalNum").textContent = t;
}

// ---- busca ----
const busca = document.getElementById("busca");
const limparBusca = document.getElementById("limparBusca");
busca.addEventListener("input",filtrar);
limparBusca.addEventListener("click",()=>{ busca.value=""; filtrar(); busca.focus(); });

function filtrar(){
  const termos = norm(busca.value.trim()).split(/\s+/).filter(Boolean);
  limparBusca.classList.toggle("on", busca.value.length>0);
  let visiveis = 0;
  refs.forEach((r,i)=>{
    const ok = termos.every(t=>NOMES_NORM[i].includes(t));
    r.item.style.display = ok ? "" : "none";
    if(ok) visiveis++;
  });
  let vz = document.getElementById("vazioMsg");
  if(visiveis===0){
    if(!vz){ vz=document.createElement("div"); vz.id="vazioMsg"; vz.className="vazio"; lista.append(vz); }
    vz.textContent = "Nenhum produto encontrado para \""+busca.value.trim()+"\".";
  }else if(vz){ vz.remove(); }
}

// ---- exportação ----
function linhasComQtd(){
  const out=[];
  PRODUTOS.forEach((nome,i)=>{ if(qtds[i]>0) out.push({nome,qtd:qtds[i]}); });
  return out;
}
function textoResumo(){
  const itens = linhasComQtd();
  const total = qtds.reduce((a,b)=>a+b,0);
  const data = new Date().toLocaleDateString("pt-BR");
  if(itens.length===0) return "Contagem de Remessa ("+data+")\nNenhum produto contado ainda.";
  let t = "Contagem de Remessa ("+data+")\n\n";
  itens.forEach(x=>{ t += x.qtd + "  " + x.nome + "\n"; });
  t += "\nTOTAL GERAL: " + total;
  return t;
}
function textoQuantidades(){
  // uma quantidade por linha, na ordem do catálogo (vazio quando 0) — p/ colar na coluna QUANTIDADE
  return qtds.map(v=> v>0 ? String(v) : "").join("\n");
}

// ---- folha de opções (menu) ----
const sheetBg=document.getElementById("sheetBg"), sheet=document.getElementById("sheet");
function abrirMenu(){ sheetBg.classList.add("on"); sheet.classList.add("on"); }
function fecharSheet(){ sheet.classList.remove("on"); sheetBg.classList.remove("on"); }
sheetBg.addEventListener("click",fecharSheet);
document.getElementById("btnFecharMenu").addEventListener("click",fecharSheet);
document.getElementById("btnMenu").addEventListener("click",abrirMenu);

// ---- tela cheia de resumo ----
const resumoFull=document.getElementById("resumoFull");
function abrirResumo(){
  const itens=linhasComQtd();
  const total=qtds.reduce((a,b)=>a+b,0);
  const body=document.getElementById("resumoBody");
  body.innerHTML="";
  if(itens.length===0){
    const v=document.createElement("div");
    v.className="resumo-vazio";
    v.textContent="Nenhum produto contado ainda. Toque em + na lista para começar.";
    body.append(v);
  }else{
    const cab=document.createElement("div");
    cab.className="resumo-cont";
    cab.textContent=itens.length+(itens.length===1?" produto":" produtos");
    body.append(cab);
    itens.forEach(x=>{
      const row=document.createElement("div"); row.className="resumo-item";
      const nm=document.createElement("div"); nm.className="rnome"; nm.textContent=x.nome;
      const q=document.createElement("div"); q.className="rqtd"; q.textContent=x.qtd;
      row.append(nm,q); body.append(row);
    });
  }
  document.getElementById("resumoTotal").textContent=total;
  resumoFull.classList.add("on");
}
function fecharResumo(){ resumoFull.classList.remove("on"); }
document.getElementById("btnEnviar").addEventListener("click",abrirResumo);
document.getElementById("resumoFechar").addEventListener("click",fecharResumo);

// copiar quantidades (rodapé) -> direto pro clipboard
document.getElementById("btnCopiar").addEventListener("click",()=>{
  copiar(textoQuantidades(), "Quantidades copiadas — cole na coluna QUANTIDADE");
});

// dentro da folha
document.getElementById("btnShareWpp").addEventListener("click",async()=>{
  const txt = textoResumo();
  if(navigator.share){
    try{ await navigator.share({text:txt}); }catch(e){}
  }else{
    const url = "https://wa.me/?text=" + encodeURIComponent(txt);
    window.open(url,"_blank");
  }
});
document.getElementById("btnCopiarResumo").addEventListener("click",()=>{
  copiar(textoResumo(),"Resumo copiado");
});

// nova semana
document.getElementById("btnNovaSemana").addEventListener("click",()=>{
  if(confirm("Zerar a contagem e começar uma semana nova? Isto não pode ser desfeito.")){
    qtds = new Array(PRODUTOS.length).fill(0);
    salvar();
    refs.forEach((_,i)=>pintarLinha(i));
    atualizarTotal();
    fecharSheet();
    fecharResumo();
    toast("Pronto — contagem zerada");
  }
});

// ---- editor de produtos ----
const editFull=document.getElementById("editFull");
function rebuildNorm(){ NOMES_NORM = PRODUTOS.map(norm); }
function aplicarMudancaCatalogo(){
  salvarCatalogo(); salvar(); rebuildNorm();
  montar();                 // reconstrói a lista de contagem
  if(busca.value) filtrar();
  renderEditor();           // atualiza a própria tela de edição
}
function renderEditor(){
  const body=document.getElementById("editBody");
  body.innerHTML="";
  const dica=document.createElement("div");
  dica.className="edit-dica";
  dica.textContent="Produtos novos entram no fim da lista. Depois de mudar, toque em \"Exportar catálogo\" e atualize o leitor no PC.";
  body.append(dica);
  PRODUTOS.forEach((nome,i)=>{
    const row=document.createElement("div"); row.className="edit-item";
    const nm=document.createElement("div"); nm.className="enome"; nm.textContent=nome;
    const ren=document.createElement("button"); ren.className="edit-btn edit-ren"; ren.textContent="✎";
    ren.setAttribute("aria-label","Renomear "+nome);
    ren.addEventListener("click",()=>renomear(i));
    const rem=document.createElement("button"); rem.className="edit-btn edit-rem"; rem.textContent="🗑";
    rem.setAttribute("aria-label","Remover "+nome);
    rem.addEventListener("click",()=>remover(i));
    row.append(nm,ren,rem);
    body.append(row);
  });
}
function nomeRepetido(nome,ignoreIdx){
  const n=norm(nome);
  return PRODUTOS.some((p,idx)=> idx!==ignoreIdx && norm(p)===n);
}
function adicionar(){
  const nome=(prompt("Nome do novo produto:")||"").trim();
  if(!nome) return;
  if(nomeRepetido(nome,-1)){ alert("Já existe um produto com esse nome."); return; }
  PRODUTOS.push(nome); qtds.push(0);
  aplicarMudancaCatalogo();
  toast("Produto adicionado");
}
function renomear(i){
  const novo=(prompt("Renomear produto:",PRODUTOS[i])||"").trim();
  if(!novo || novo===PRODUTOS[i]) return;
  if(nomeRepetido(novo,i)){ alert("Já existe um produto com esse nome."); return; }
  PRODUTOS[i]=novo;
  aplicarMudancaCatalogo();
  toast("Nome alterado");
}
function remover(i){
  const temContagem = qtds[i]>0;
  const aviso = temContagem
    ? "Este produto tem "+qtds[i]+" na contagem atual. Remover mesmo assim?"
    : "Remover \""+PRODUTOS[i]+"\" do catálogo?";
  if(!confirm(aviso)) return;
  PRODUTOS.splice(i,1); qtds.splice(i,1);
  aplicarMudancaCatalogo();
  toast("Produto removido");
}
function abrirEditor(){ renderEditor(); fecharSheet(); editFull.classList.add("on"); }
function fecharEditor(){ editFull.classList.remove("on"); }
document.getElementById("btnEditarProdutos").addEventListener("click",abrirEditor);
document.getElementById("editFechar").addEventListener("click",fecharEditor);
document.getElementById("btnAddProduto").addEventListener("click",adicionar);
document.getElementById("btnExportCat").addEventListener("click",()=>{
  // catálogo completo, um nome por linha, na ordem atual — p/ colar no produtos.txt do leitor
  copiar(PRODUTOS.join("\n"), "Catálogo copiado — cole no produtos.txt do leitor");
});


// ---- utilidades ----
function copiar(texto,msg){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(texto).then(()=>toast(msg)).catch(()=>copiarFallback(texto,msg));
  }else{ copiarFallback(texto,msg); }
}
function copiarFallback(texto,msg){
  const ta=document.createElement("textarea");
  ta.value=texto; ta.style.position="fixed"; ta.style.opacity="0"; document.body.append(ta);
  ta.select();
  try{ document.execCommand("copy"); toast(msg); }catch(e){ toast("Não consegui copiar"); }
  ta.remove();
}
let toastTimer=null;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("on"),2200);
}

// ---- start ----
montar();

// ---- service worker (só funciona via http/https; em file:// ignora sem erro) ----
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
